<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النتيجة الشاملة - سفراء البصمة الكربونية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f7f4; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #ffffff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 550px; text-align: center; }
        .logo-placeholder { width: 120px; height: 120px; background-color: #2e7d32; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; font-size: 14px; font-weight: bold; border: 4px solid #c8e6c9; }
        h2 { color: #2e7d32; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #c8e6c9; border-radius: 8px; font-size: 16px; outline: none; }
        .search-box input:focus { border-color: #2e7d32; }
        .search-box button { background-color: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        .search-box button:hover { background-color: #1b5e20; }
        .search-box button:disabled { background-color: #9e9e9e; cursor: not-allowed; }
        
        #result-section { display: none; text-align: right; background: #fafafa; padding: 20px; border-radius: 10px; border: 1px solid #e0e0e0; margin-top: 20px; }
        .student-name { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 10px; text-align: center; }
        #congrats-text { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        
        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .score-card { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .score-card h4 { margin: 0 0 5px 0; color: #555; font-size: 14px; }
        .score-card .val { font-size: 24px; font-weight: bold; color: #2e7d32; }
        .score-card .details { font-size: 12px; color: #888; margin-top: 5px; }
        
        #grand-box { color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        #grand-box .val { font-size: 30px; font-weight: bold; }
        #percentage-val { font-size: 16px; margin-top: 5px; }
        
        #loading { color: #2e7d32; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-placeholder">سفراء البصمة<br>الكربونية</div>
    <h2>استعلام النتيجة النهائية</h2>
    <p style="color: #666; margin-bottom: 20px;">الرجاء إدخال رقم الواتساب أو الاسم الرباعي لمعرفة نتيجتك</p>
    
    <div id="loading">⏳ جاري ربط البيانات بالنظام... برجاء الانتظار</div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="رقم الواتساب أو الاسم الرباعي..." onkeypress="if(event.key === 'Enter') checkResult()">
        <button onclick="checkResult()" id="search-btn" disabled>بحث 🔍</button>
    </div>
    
    <div id="result-section">
        <div id="congrats-text"></div>
        <div class="student-name" id="s-name"></div>
        
        <div id="grand-box">
            <div>المجموع الكلي</div>
            <div class="val" id="grand-val"></div>
            <div id="percentage-val"></div>
        </div>
        
        <div class="score-grid">
            <div class="score-card">
                <h4>درجة الحضور</h4>
                <div class="val" id="l-score"></div>
                <div class="details" id="l-details"></div>
            </div>
            <div class="score-card">
                <h4>درجة التاسكات</h4>
                <div class="val" id="t-score"></div>
                <div class="details" id="t-details"></div>
            </div>
        </div>
        <div class="score-card" style="margin-bottom:0;">
            <h4>درجة الاختبار النهائي</h4>
            <div class="val" id="total-score"></div>
        </div>
    </div>
</div>

<script>
    let studentData = {};
    
    // رابط جوجل شيتس الذي قمت بتوليده
    const googleSheetCSVLink = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQngddmTsPoxpQlMl6-9-4MFslwXoTx7m_BRapAizpBmibnLupl-rGvYZbHHA1kvQpybRxorzKxG5z6/pub?gid=1679868847&single=true&output=csv";

    // دالة سحب البيانات عند فتح الموقع
    function loadDataFromGoogleSheets() {
        document.getElementById('loading').style.display = 'block';
        Papa.parse(googleSheetCSVLink, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                data.forEach(row => {
                    // التأكد من وجود البيانات وتخزينها
                    if (row['رقم الواتساب'] && row['الاسم الرباعي']) {
                        const phone = String(row['رقم الواتساب']).trim();
                        const name = String(row['الاسم الرباعي']).trim();
                        
                        let lectures_str = row['إجمالي الحضور (كمحاضرات)'] || "0";
                        let tasks_str = row['إجمالي التاسكات (كمشاركات)'] || "0";
                        
                        const studentObj = {
                            "name": name,
                            "phone": phone,
                            "total_lectures": lectures_str.split(' ')[0],
                            "l_score": row['درجة الحضور (10)'] || "0",
                            "total_tasks": tasks_str.split(' ')[0],
                            "t_score": row['درجة التاسكات (10)'] || "0",
                            "exam_score": row['درجة الاختبار النهائي (10)'] || "0",
                            "grand_total": parseFloat(row['المجموع الكلي للبرنامج (30)']) || 0,
                            "percentage": row['النسبة المئوية (%)'] || "0%",
                            "status": row['النتيجة النهائية'] || ""
                        };
                        
                        // الحفظ لتسهيل البحث بالرقم أو الاسم
                        studentData[phone] = studentObj;
                        studentData[name] = studentObj;
                    }
                });
                
                // إخفاء رسالة التحميل وتفعيل زر البحث
                document.getElementById('loading').style.display = 'none';
                document.getElementById('search-btn').disabled = false;
            },
            error: function(err) {
                console.error("خطأ:", err);
                document.getElementById('loading').innerText = '❌ حدث خطأ في تحميل البيانات. يرجى إعادة تحميل الصفحة.';
            }
        });
    }

    // تشغيل الدالة فوراً
    window.onload = loadDataFromGoogleSheets;

    // دالة إظهار النتيجة للمتدرب
    function checkResult() {
        const input = document.getElementById('search-input').value.trim();
        const result = studentData[input]; 
        const resultSection = document.getElementById('result-section');
        
        if (!input) {
            alert("برجاء إدخال رقم الواتساب أو الاسم أولاً.");
            return;
        }
        
        if (result) {
            resultSection.style.display = 'block';
            document.getElementById('s-name').innerText = result.name;
            document.getElementById('grand-val').innerText = result.grand_total + ' / 30';
            
            let percentage = Math.round((result.grand_total / 30) * 100);
            document.getElementById('percentage-val').innerText = 'النسبة المئوية: ' + percentage + '%';
            
            document.getElementById('l-score').innerText = result.l_score;
            document.getElementById('l-details').innerText = '(حضر ' + result.total_lectures + ' من 6 محاضرات)';
            
            document.getElementById('t-score').innerText = result.t_score;
            document.getElementById('t-details').innerText = '(سلم ' + result.total_tasks + ' من 4 تاسكات)';
            
            document.getElementById('total-score').innerText = result.exam_score;
            
            const congratsEl = document.getElementById('congrats-text');
            const grandBox = document.getElementById('grand-box');
            
            // شرط النجاح: 18 درجة فأكثر
            if (result.grand_total >= 18) { 
                congratsEl.innerText = 'ألف مبروك! 🎉 (اجتياز)'; 
                congratsEl.style.color = '#2e7d32'; 
                grandBox.style.background = 'linear-gradient(135deg, #4caf50, #2e7d32)';
            } else { 
                congratsEl.innerText = 'للأسف لم يتم اجتياز البرنامج'; 
                congratsEl.style.color = '#d32f2f'; 
                grandBox.style.background = 'linear-gradient(135deg, #ef5350, #c62828)';
            }
        } else {
            resultSection.style.display = 'none';
            alert("عذراً، لم يتم العثور على بيانات بهذا الرقم أو الاسم. تأكد من صحة الإدخال.");
        }
    }
</script>
</body>
</html>
