<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النتيجة النهائية - سفراء البصمة الكربونية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f7f4; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #ffffff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 550px; text-align: center; }
        
        .logo-img { width: 150px; max-height: 150px; object-fit: contain; margin: 0 auto 20px; display: block; }
        
        h2 { color: #2e7d32; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #c8e6c9; border-radius: 8px; font-size: 16px; outline: none; }
        .search-box input:focus { border-color: #2e7d32; }
        .search-box button { background-color: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        .search-box button:hover { background-color: #1b5e20; }
        .search-box button:disabled { background-color: #9e9e9e; cursor: not-allowed; }
        
        #result-section { display: none; text-align: center; background: #fafafa; padding: 30px 20px; border-radius: 10px; border: 2px solid #e0e0e0; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .student-name { font-size: 24px; font-weight: bold; color: #333; margin-top: 15px; margin-bottom: 5px; }
        #congrats-text { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        #status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-size: 18px; font-weight: bold; margin-top: 15px; color: white; }
        
        #loading { color: #2e7d32; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="شعار المؤسسة" class="logo-img">
    
    <h2>استعلام النتيجة النهائية</h2>
    <p style="color: #666; margin-bottom: 20px;">الرجاء إدخال رقم الواتساب </p>
    
    <div id="loading">⏳ جاري ربط البيانات بالنظام... برجاء الانتظار</div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="رقم الواتساب أو الاسم الرباعي..." onkeypress="if(event.key === 'Enter') checkResult()">
        <button onclick="checkResult()" id="search-btn" disabled>بحث 🔍</button>
    </div>
    
    <div id="result-section">
        <div id="congrats-text"></div>
        <div class="student-name" id="s-name"></div>
        <div id="status-badge"></div>
    </div>
</div>

<script>
    let studentData = {};
    
    // رابط جوجل شيتس
    const googleSheetCSVLink = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQngddmTsPoxpQlMl6-9-4MFslwXoTx7m_BRapAizpBmibnLupl-rGvYZbHHA1kvQpybRxorzKxG5z6/pub?gid=1679868847&single=true&output=csv";

    // سحب البيانات من الشيت
    function loadDataFromGoogleSheets() {
        document.getElementById('loading').style.display = 'block';
        Papa.parse(googleSheetCSVLink, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                data.forEach(row => {
                    if (row['رقم الواتساب'] && row['الاسم الرباعي']) {
                        const phone = String(row['رقم الواتساب']).trim();
                        const name = String(row['الاسم الرباعي']).trim();
                        
                        const studentObj = {
                            "name": name,
                            "phone": phone,
                            "grand_total": parseFloat(row['المجموع الكلي للبرنامج (30)']) || 0
                        };
                        
                        studentData[phone] = studentObj;
                        studentData[name] = studentObj;
                    }
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('search-btn').disabled = false;
            },
            error: function(err) {
                console.error("خطأ:", err);
                document.getElementById('loading').innerText = '❌ حدث خطأ في تحميل البيانات. يرجى إعادة تحميل الصفحة.';
            }
        });
    }

    window.onload = loadDataFromGoogleSheets;

    function checkResult() {
        const input = document.getElementById('search-input').value.trim();
        const result = studentData[input]; 
        const resultSection = document.getElementById('result-section');
        
        if (!input) {
            alert("برجاء إدخال رقم الواتساب أو الاسم أولاً.");
            return;
        }
        
        if (result) {
            resultSection.style.display = 'block';
            document.getElementById('s-name').innerText = result.name;
            
            const congratsEl = document.getElementById('congrats-text');
            const statusBadge = document.getElementById('status-badge');
            
            // شرط النجاح: 18 درجة فأكثر (60%)
            if (result.grand_total >= 18) { 
                congratsEl.innerText = 'ألف مبروك! 🎉'; 
                congratsEl.style.color = '#2e7d32'; 
                
                statusBadge.innerText = 'النتيجة: اجتاز البرنامج بنجاح ✅';
                statusBadge.style.backgroundColor = '#4caf50';
                resultSection.style.borderColor = '#4caf50';
                resultSection.style.backgroundColor = '#f1f8e9';
            } else { 
                congratsEl.innerText = 'عذراً..'; 
                congratsEl.style.color = '#d32f2f'; 
                
                statusBadge.innerText = 'النتيجة: لم يجتز البرنامج ❌';
                statusBadge.style.backgroundColor = '#f44336';
                resultSection.style.borderColor = '#f44336';
                resultSection.style.backgroundColor = '#ffebee';
            }
        } else {
            resultSection.style.display = 'none';
            alert("عذراً، لم يتم العثور على بيانات بهذا الرقم أو الاسم. تأكد من صحة الإدخال.");
        }
    }
</script>
</body>
</html>
